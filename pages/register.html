<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — ContentForge AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="container px-4" style="padding:40px 0;">
    <div class="d-flex justify-content-center mb-4">
      <a href="../index.html" class="d-flex align-items-center gap-2">
        <div class="logo-icon">⚡</div>
        <span class="logo-text" style="font-size:18px;">ContentForge AI</span>
      </a>
    </div>
    <div class="auth-card mx-auto">
      <h2 style="font-family:'Syne',sans-serif;font-weight:800;margin-bottom:4px;">Create your account</h2>
      <p style="color:var(--text-muted);font-size:13.5px;margin-bottom:24px;">Start generating content for free — no credit card required</p>

      <button class="btn-google" onclick="showToast('Google OAuth coming soon!')">
        <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google"> Continue with Google
      </button>
      <div class="auth-divider">or register with email</div>

      <div class="row g-3">
        <div class="col-6">
          <label class="form-label-custom">First Name</label>
          <input type="text" class="form-control-custom" placeholder="John">
        </div>
        <div class="col-6">
          <label class="form-label-custom">Last Name</label>
          <input type="text" class="form-control-custom" placeholder="Doe">
        </div>
        <div class="col-12">
          <label class="form-label-custom">Email address</label>
          <input type="email" class="form-control-custom" placeholder="you@company.com">
        </div>
        <div class="col-12">
          <label class="form-label-custom">Password</label>
          <div style="position:relative;">
            <input type="password" class="form-control-custom" id="regPass" placeholder="Min. 8 characters" style="padding-right:44px;">
            <button onclick="togglePass('regPass')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;">
              <i class="bi bi-eye" id="regPassIcon"></i>
            </button>
          </div>
          <!-- Password strength -->
          <div class="mt-2 d-flex gap-1">
            <div style="height:3px;flex:1;background:var(--primary);border-radius:2px;" id="ps1"></div>
            <div style="height:3px;flex:1;background:var(--border);border-radius:2px;" id="ps2"></div>
            <div style="height:3px;flex:1;background:var(--border);border-radius:2px;" id="ps3"></div>
            <div style="height:3px;flex:1;background:var(--border);border-radius:2px;" id="ps4"></div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Password strength: <span id="psLabel">Weak</span></div>
        </div>
        <div class="col-12">
          <label class="form-label-custom">Company (optional)</label>
          <input type="text" class="form-control-custom" placeholder="Acme Inc.">
        </div>
      </div>

      <div class="d-flex align-items-start gap-2 mt-3 mb-4">
        <input type="checkbox" id="terms" style="accent-color:var(--primary);margin-top:3px;">
        <label for="terms" style="font-size:12.5px;color:var(--text-muted);cursor:pointer;line-height:1.5;">
          I agree to ContentForge AI's <a href="#" style="color:var(--primary);">Terms of Service</a> and <a href="#" style="color:var(--primary);">Privacy Policy</a>
        </label>
      </div>

      <a href="dashboard.html" class="btn-primary-custom w-100 justify-content-center" style="font-size:14px;padding:12px;">
        <i class="bi bi-stars"></i> Create Free Account
      </a>

      <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:20px;">
        Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
function togglePass(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById(id + 'Icon');
  el.type = el.type === 'password' ? 'text' : 'password';
  icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
document.getElementById('regPass').addEventListener('input', function() {
  const val = this.value;
  const levels = [val.length >= 4, val.length >= 8, /[A-Z]/.test(val) && /[0-9]/.test(val), /[^A-Za-z0-9]/.test(val) && val.length >= 10];
  const score = levels.filter(Boolean).length;
  const colors = ['var(--danger)', 'var(--warning)', 'var(--primary)', 'var(--accent)'];
  const labels = ['Weak', 'Fair', 'Good', 'Strong'];
  for (let i = 1; i <= 4; i++) {
    document.getElementById('ps' + i).style.background = i <= score ? colors[score - 1] : 'var(--border)';
  }
  document.getElementById('psLabel').textContent = score > 0 ? labels[score - 1] : 'Weak';
  document.getElementById('psLabel').style.color = score > 0 ? colors[score - 1] : 'var(--text-muted)';
});
</script>
</body>
</html>
