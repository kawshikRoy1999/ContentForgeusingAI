<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ContentForge AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="container px-4">
    <div class="d-flex justify-content-center mb-4">
      <a href="../index.html" class="d-flex align-items-center gap-2" style="text-decoration:none;">
        <div class="logo-icon">⚡</div>
        <span class="logo-text" style="font-size:18px;">ContentForge AI</span>
      </a>
    </div>
    <div class="auth-card mx-auto">
      <h2 style="font-family:'Syne',sans-serif;font-weight:800;margin-bottom:4px;">Welcome back</h2>
      <p style="color:var(--text-muted);font-size:13.5px;margin-bottom:24px;">Sign in to your account to continue</p>

      <button class="btn-google" onclick="showToast('Google OAuth coming soon!')">
        <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google"> Continue with Google
      </button>

      <div class="auth-divider">or sign in with email</div>

      <div class="mb-3">
        <label class="form-label-custom">Email address</label>
        <input type="email" class="form-control-custom" placeholder="you@company.com">
      </div>
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label-custom mb-0">Password</label>
          <a href="forgot-password.html" style="font-size:12px;color:var(--primary);">Forgot password?</a>
        </div>
        <div style="position:relative;">
          <input type="password" class="form-control-custom" id="loginPass" placeholder="••••••••" style="padding-right:44px;">
          <button onclick="togglePass('loginPass')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;">
            <i class="bi bi-eye" id="loginPassIcon"></i>
          </button>
        </div>
      </div>

      <div class="d-flex align-items-center gap-2 mb-4">
        <input type="checkbox" id="rememberMe" style="accent-color:var(--primary);">
        <label for="rememberMe" style="font-size:13px;color:var(--text-light);cursor:pointer;">Remember me for 30 days</label>
      </div>

      <a href="dashboard.html" class="btn-primary-custom w-100 justify-content-center" style="font-size:14px;padding:12px;">
        Sign In <i class="bi bi-arrow-right"></i>
      </a>

      <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:20px;">
        Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600;">Sign up free</a>
      </p>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
function togglePass(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById(id + 'Icon');
  el.type = el.type === 'password' ? 'text' : 'password';
  icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
